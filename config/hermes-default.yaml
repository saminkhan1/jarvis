# AURA repo-backed Hermes configuration template.
#
# script/setup.sh copies this file to .aura/hermes-home/config.yaml only when
# that local file does not already exist. Edit the copied file, not this
# template, for machine-specific provider/model choices.

model:
  # Validate the configured provider/model with:
  #   ./script/aura-hermes doctor
  #   ./script/aura-hermes chat -Q --yolo --source aura-setup -q "Reply exactly: AURA OK"
  default: gpt-5.5
  provider: openai-codex
  base_url: https://openrouter.ai/api/v1

terminal:
  backend: local
  cwd: .
  timeout: 180
  lifetime_seconds: 300
  docker_mount_cwd_to_workspace: false
  persistent_shell: true

agent:
  max_turns: 60
  api_max_retries: 3
  reasoning_effort: medium
  verbose: false

approvals:
  # MVP validation runs approval-free. AURA also passes --yolo on Hermes chat
  # missions so dangerous-command prompts do not pause the product loop.
  mode: off
  timeout: 60
  cron_mode: deny

platform_toolsets:
  # Conservative default plus Hermes-owned computer-use for CUA missions.
  cli:
    - web
    - skills
    - todo
    - memory
    - session_search
    - clarify
    - delegation
    - computer_use

display:
  streaming: true
  final_response_markdown: strip
  show_reasoning: false
  tool_progress: new

tool_output:
  max_bytes: 50000
  max_lines: 2000
  max_line_length: 2000

compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20

memory:
  provider: builtin

voice:
  record_key: ctrl+b
  max_recording_seconds: 120
  auto_tts: false
  beep_enabled: true
  silence_threshold: 200
  silence_duration: 3.0

stt:
  # Local STT uses faster-whisper and does not need an API key.
  provider: local
  local:
    model: base

tts:
  # Edge TTS is the no-key default. Hermes owns TTS playback.
  provider: edge
  edge:
    voice: en-US-AriaNeural
